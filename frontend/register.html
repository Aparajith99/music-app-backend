<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your MusicCloud account to start discovering and subscribing to music." />
  <title>Register | MusicCloud</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="register">

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="visualizer">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
        <h1>MusicCloud</h1>
        <p>Create a new account</p>
      </div>

      <form id="register-form" autocomplete="on">
        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="register-username">Username</label>
          <input type="text" id="register-username" placeholder="Choose a username" required />
        </div>

        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" placeholder="Choose a password" required />
        </div>

        <button type="submit" id="register-btn" class="btn btn-primary btn-full">Register</button>

        <div id="register-message" class="message"></div>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="index.html">Login</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
