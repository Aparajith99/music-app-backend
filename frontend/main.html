<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MusicCloud - Discover, query, and subscribe to your favourite music." />
  <title>Dashboard | MusicCloud</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="main">

  <!-- ===== Header ===== -->
  <header class="app-header">
    <div class="brand">
      <span>🎵</span>
      <span>MusicCloud</span>
    </div>
    <div class="header-right">
      <div class="user-info">
        Welcome, <strong id="user-name-display"></strong>
      </div>
      <button id="logout-btn">Logout</button>
    </div>
  </header>

  <!-- ===== Main Content ===== -->
  <main class="main-content">

    <!-- Subscriptions Section -->
    <section class="section-card" id="subscriptions-section">
      <h2 class="section-title">
        <span class="icon">♫</span> My Subscriptions
      </h2>
      <div id="subscriptions-container" class="song-scroll">
        <!-- Populated dynamically -->
      </div>
    </section>

    <!-- Query Section -->
    <section class="section-card" id="query-section">
      <h2 class="section-title">
        <span class="icon">🔍</span> Discover Music
      </h2>

      <form id="query-form">
        <div class="query-form">
          <input type="text" id="query-title" placeholder="Title" />
          <input type="text" id="query-artist" placeholder="Artist" />
          <input type="text" id="query-year" placeholder="Year" />
          <input type="text" id="query-album" placeholder="Album" />
        </div>
        <div class="query-actions">
          <button type="submit" id="query-btn" class="btn btn-primary">Query</button>
        </div>
      </form>

      <div id="query-message" class="message"></div>

      <div id="query-results" class="song-grid">
        <!-- Populated dynamically -->
      </div>
    </section>

  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
